<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Diccionario</title>
  </head>
  <body>
    <div id="abecedarioApp" class="abecedario-wrapper">
      <div class="board-container">
        <h1>Tablero del Abecedario</h1>
        <p>Haz clic en cualquier letra para cambiar su color.</p>

        <div id="alphabet-grid">
          <div class="letra-item">A</div>
          <div class="letra-item">B</div>
          <div class="letra-item">C</div>
          <div class="letra-item">D</div>
          <div class="letra-item">E</div>
          <div class="letra-item">F</div>
          <div class="letra-item">G</div>
          <div class="letra-item">H</div>
          <div class="letra-item">I</div>
          <div class="letra-item">J</div>
          <div class="letra-item">K</div>
          <div class="letra-item">L</div>
          <div class="letra-item">M</div>
          <div class="letra-item">N</div>
          <div class="letra-item">O</div>
          <div class="letra-item">P</div>
          <div class="letra-item">Q</div>
          <div class="letra-item">R</div>
          <div class="letra-item">S</div>
          <div class="letra-item">T</div>
          <div class="letra-item">U</div>
          <div class="letra-item">V</div>
          <div class="letra-item">W</div>
          <div class="letra-item">X</div>
          <div class="letra-item">Y</div>
          <div class="letra-item">Z</div>
        </div>

        <button id="reset-board-btn">Limpiar Tablero</button>
      </div>
    </div>
  </body>
</html>
